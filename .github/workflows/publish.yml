name: Publish

# Triggered whenever a commit lands on main or a release/* branch.
# Only proceeds if the commit is a release commit (message starts with
# 'chore: release '), which is the pattern used by prepare-release.yml PRs.

on:
  push:
    branches:
      - main
      - 'release/**'

permissions: {}

jobs:
  detect:
    name: Detect release commit
    runs-on: ubuntu-latest
    if: github.repository == 'adobe/premierepro-types'
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      type: ${{ steps.detect.outputs.type }}
      version: ${{ steps.detect.outputs.version }}
      dist_tag: ${{ steps.detect.outputs.dist_tag }}
      next_cycle: ${{ steps.detect.outputs.next_cycle }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: detect
        run: node .github/scripts/detect-release.mjs

  publish:
    name: Publish to npm
    needs: detect
    if: needs.detect.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write      # git tag, release branch, GitHub release
      pull-requests: write # open next-cycle PR (stable releases only)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Create and push git tag
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Verify version is not a downgrade
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          DIST_TAG: ${{ needs.detect.outputs.dist_tag }}
        run: node .github/scripts/check-version-order.mjs

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          DIST_TAG: ${{ needs.detect.outputs.dist_tag }}
        run: npm publish --tag "$DIST_TAG" --access public

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: node .github/scripts/extract-release-notes.mjs

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.detect.outputs.version }}
          TYPE: ${{ needs.detect.outputs.type }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$TYPE" = "beta" ]; then PRERELEASE_FLAG="--prerelease"; fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG

      # Stable-only: create the release branch for future backports.
      - name: Create release branch
        if: needs.detect.outputs.type == 'stable'
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          RELEASE_BRANCH="release/${VERSION%.*}"
          git branch "$RELEASE_BRANCH"
          git push origin "$RELEASE_BRANCH"

      # Stable-only: open a PR to begin the next beta cycle on main.
      - name: Open next beta cycle PR
        if: needs.detect.outputs.type == 'stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_CYCLE: ${{ needs.detect.outputs.next_cycle }}
        run: node .github/scripts/open-next-cycle.mjs
